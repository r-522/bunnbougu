<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入荷登録 - 文房具基幹システム</title>
  <link rel="stylesheet" href="./css/common.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <span class="header__title">文房具基幹システム</span>
      <span class="header__user">
        <span class="mono">12345</span> 業務太郎
        <a href="/logout">ログアウト</a>
      </span>
    </div>
  </header>

  <main class="main">
    <nav class="breadcrumb" aria-label="パンくずリスト">
      <a href="./menu.html">メニュー</a>
      <span class="breadcrumb__sep">&gt;</span>
      <span>入荷登録</span>
    </nav>

    <h1 class="h1">F09 入荷登録</h1>

    <div class="msg msg--info">発注番号を指定し、入荷数量を入力してください。入荷処理により在庫数が自動更新されます。</div>

    <form class="search" action="./nyuka.html" method="get">
      <div class="search__row">
        <label class="search__label" for="q_hano">発注番号</label>
        <input class="input input--sm" type="text" id="q_hano" name="hano"
          maxlength="12" value="H202604002">
        <button class="btn btn--primary btn--sm" type="submit">表示</button>
      </div>
    </form>

    <form class="form" action="/nyuka" method="post" novalidate
      data-confirm="入荷実績を登録します。よろしいですか？">
      <h2 class="h2">発注情報</h2>
      <table class="table table--detail" aria-label="発注情報">
        <tbody>
          <tr><th scope="row">発注番号</th><td class="mono">H202604002</td></tr>
          <tr><th scope="row">発注日</th><td class="mono">2026-04-10</td></tr>
          <tr><th scope="row">仕入先</th><td>T0002 大阪ステーショナリー商会</td></tr>
          <tr><th scope="row">入荷予定日</th><td class="mono">2026-04-20</td></tr>
          <tr><th scope="row">状態</th><td>一部入荷</td></tr>
        </tbody>
      </table>

      <h2 class="h2">入荷情報</h2>
      <div class="form__row">
        <label class="form__label form__label--required" for="nydt">入荷日</label>
        <div class="form__control">
          <input class="input input--sm" type="date" id="nydt" name="nydt"
            value="2026-04-19" data-validate="required" required>
          <span class="form__error" data-error-for="nydt" role="alert"></span>
        </div>
      </div>

      <div class="form__row">
        <label class="form__label" for="nyno">納品書番号</label>
        <div class="form__control">
          <input class="input input--md mono" type="text" id="nyno" name="nyno" maxlength="20">
        </div>
      </div>

      <h2 class="h2">明細</h2>
      <table class="table" aria-label="入荷明細">
        <thead>
          <tr>
            <th scope="col">行</th>
            <th scope="col">商品コード</th>
            <th scope="col">商品名</th>
            <th scope="col">発注数</th>
            <th scope="col">入荷済数</th>
            <th scope="col">今回入荷数</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="table__center mono">1</td>
            <td class="mono">P0002</td>
            <td>B5キャンパスノート 30枚</td>
            <td class="table__num" data-format="number">200</td>
            <td class="table__num" data-format="number">100</td>
            <td>
              <input class="input input--num" type="number" name="dt_nyqty_1"
                value="100" min="0" step="1" data-validate="numeric">
            </td>
          </tr>
          <tr>
            <td class="table__center mono">2</td>
            <td class="mono">P0004</td>
            <td>スティックのり 大</td>
            <td class="table__num" data-format="number">300</td>
            <td class="table__num" data-format="number">0</td>
            <td>
              <input class="input input--num" type="number" name="dt_nyqty_2"
                value="300" min="0" step="1" data-validate="numeric">
            </td>
          </tr>
        </tbody>
      </table>

      <div class="form__actions">
        <a class="btn" href="./menu.html">キャンセル</a>
        <button class="btn btn--primary" type="submit">入荷登録する</button>
      </div>
    </form>
  </main>

  <footer class="footer">
    <small>&copy; Stationery Core System</small>
  </footer>

  <script src="./js/common.js"></script>
  <script src="./js/validate.js"></script>
</body>
</html>
