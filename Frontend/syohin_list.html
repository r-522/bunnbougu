<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品マスタ一覧 - 文房具基幹システム</title>
  <link rel="stylesheet" href="./css/common.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <span class="header__title">文房具基幹システム</span>
      <span class="header__user">
        <span class="mono">${syain_no}</span> ${syain_name}
        <a href="/logout">ログアウト</a>
      </span>
    </div>
  </header>

  <main class="main">
    <nav class="breadcrumb" aria-label="パンくずリスト">
      <a href="./menu.html">メニュー</a>
      <span class="breadcrumb__sep">&gt;</span>
      <span>商品マスタ一覧</span>
    </nav>

    <h1 class="h1">F03 商品マスタ一覧</h1>

    <form class="search" action="./syohin_list.html" method="get">
      <div class="search__row">
        <label class="search__label" for="q_prdcd">商品コード</label>
        <input class="input input--sm" type="text" id="q_prdcd" name="prdcd" maxlength="10">
        <label class="search__label" for="q_prdnm">商品名</label>
        <input class="input input--md" type="text" id="q_prdnm" name="prdnm" maxlength="60">
        <label class="search__label" for="q_cate">カテゴリ</label>
        <select class="select" id="q_cate" name="cate">
          <option value="">すべて</option>
          <option value="01">筆記具</option>
          <option value="02">ノート・紙製品</option>
          <option value="03">ファイル・バインダ</option>
          <option value="04">接着・修正</option>
          <option value="05">事務雑貨</option>
        </select>
      </div>
      <div class="search__actions">
        <button class="btn btn--primary btn--sm" type="submit">検索</button>
        <a class="btn btn--sm" href="./syohin_list.html">クリア</a>
      </div>
    </form>

    <div class="btn-group">
      <a class="btn btn--primary" href="./syohin_form.html">新規登録</a>
      <a class="btn" href="./menu.html">メニューへ戻る</a>
    </div>

    <table class="table" aria-label="商品マスタ一覧">
      <thead>
        <tr>
          <th scope="col">商品コード</th>
          <th scope="col">商品名</th>
          <th scope="col">カテゴリ</th>
          <th scope="col">単価</th>
          <th scope="col">単位</th>
          <th scope="col">登録日</th>
          <th scope="col">操作</th>
        </tr>
      </thead>
      <tbody>
        ${raw:rows}
      </tbody>
    </table>

    <nav class="pagination" aria-label="ページ送り">
      <a href="?page=1">&lt;&lt; 先頭</a>
      <a href="?page=1">&lt; 前</a>
      <span class="pagination__current">1</span> / 3
      <a href="?page=2">次 &gt;</a>
      <a href="?page=3">末尾 &gt;&gt;</a>
    </nav>
  </main>

  <footer class="footer">
    <small>&copy; Stationery Core System</small>
  </footer>

  <script src="./js/common.js"></script>
</body>
</html>
