<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社員マスタ一覧 - 文房具基幹システム</title>
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <span class="header__title">文房具基幹システム</span>
      <span class="header__user">
        <span class="mono">${syain_no}</span> ${syain_name}
        <a href="/logout">ログアウト</a>
      </span>
    </div>
  </header>

  <main class="main">
    <nav class="breadcrumb" aria-label="パンくずリスト">
      <a href="/menu">メニュー</a>
      <span class="breadcrumb__sep">&gt;</span>
      <span>社員マスタ一覧</span>
    </nav>

    <h1 class="h1">F05 社員マスタ一覧</h1>

    <form class="search" action="/syain" method="get">
      <div class="search__row">
        <label class="search__label" for="q_sycd">社員番号</label>
        <input class="input input--sm" type="text" id="q_sycd" name="sycd"
          maxlength="5" inputmode="numeric" pattern="\d*">
        <label class="search__label" for="q_synm">氏名</label>
        <input class="input input--md" type="text" id="q_synm" name="synm" maxlength="40">
        <label class="search__label" for="q_sybs">所属</label>
        <select class="select" id="q_sybs" name="sybs">
          <option value="">すべて</option>
          <option value="10">営業部</option>
          <option value="20">仕入部</option>
          <option value="30">物流部</option>
          <option value="40">情報システム部</option>
          <option value="90">管理部</option>
        </select>
      </div>
      <div class="search__actions">
        <button class="btn btn--primary btn--sm" type="submit">検索</button>
        <a class="btn btn--sm" href="/syain">クリア</a>
      </div>
    </form>

    <div class="btn-group">
      <a class="btn btn--primary" href="/syain/new">新規登録</a>
      <a class="btn" href="/menu">メニューへ戻る</a>
    </div>

    <table class="table" aria-label="社員マスタ一覧">
      <thead>
        <tr>
          <th scope="col">社員番号</th>
          <th scope="col">氏名</th>
          <th scope="col">氏名（カナ）</th>
          <th scope="col">所属</th>
          <th scope="col">役職</th>
          <th scope="col">登録日</th>
          <th scope="col">操作</th>
        </tr>
      </thead>
      <tbody>
        ${raw:rows}
      </tbody>
    </table>

    <nav class="pagination" aria-label="ページ送り">
      <span class="pagination__current">1</span> / 1
    </nav>
  </main>

  <footer class="footer">
    <small>&copy; Stationery Core System</small>
  </footer>

  <script src="/js/common.js"></script>
</body>
</html>
