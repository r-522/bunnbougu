<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>ログイン - 文房具基幹システム</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <span class="header__title">文房具基幹システム</span>
    </div>
  </header>

  <main class="main">
    <section class="login" aria-labelledby="login-title">
      <h1 id="login-title" class="login__title">ログイン</h1>
      <p class="login__subtitle">社員番号（5桁）を入力してください。</p>

      <form id="form-login" class="login__form" action="/login" method="post" autocomplete="off" novalidate>
        <div class="login__row">
          <label class="login__label" for="syain_no">社員番号</label>
          <input
            id="syain_no"
            class="login__input"
            type="text"
            name="syain_no"
            inputmode="numeric"
            pattern="\d{5}"
            maxlength="5"
            minlength="5"
            required
            autofocus
            aria-describedby="syain_no_hint syain_no_err">
          <span id="syain_no_hint" class="form__hint">半角数字5桁</span>
          <span id="syain_no_err" class="form__error" data-error-for="syain_no" role="alert"></span>
        </div>
        <div class="login__actions">
          <button class="login__submit" type="submit">ログイン</button>
        </div>
      </form>

      <p class="login__note">社員番号が不明な場合は情報システム部までお問い合わせください。</p>
    </section>
  </main>

  <footer class="footer">
    <small>&copy; Stationery Core System</small>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/validate.js"></script>
</body>
</html>
