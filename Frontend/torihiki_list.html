<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取引先マスタ一覧 - 文房具基幹システム</title>
  <link rel="stylesheet" href="./css/common.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <span class="header__title">文房具基幹システム</span>
      <span class="header__user">
        <span class="mono">${syain_no}</span> ${syain_name}
        <a href="/logout">ログアウト</a>
      </span>
    </div>
  </header>

  <main class="main">
    <nav class="breadcrumb" aria-label="パンくずリスト">
      <a href="./menu.html">メニュー</a>
      <span class="breadcrumb__sep">&gt;</span>
      <span>取引先マスタ一覧</span>
    </nav>

    <h1 class="h1">F04 取引先マスタ一覧</h1>

    <form class="search" action="./torihiki_list.html" method="get">
      <div class="search__row">
        <label class="search__label" for="q_trcd">取引先コード</label>
        <input class="input input--sm" type="text" id="q_trcd" name="trcd" maxlength="10">
        <label class="search__label" for="q_trnm">取引先名</label>
        <input class="input input--md" type="text" id="q_trnm" name="trnm" maxlength="60">
        <label class="search__label" for="q_trtp">区分</label>
        <select class="select" id="q_trtp" name="trtp">
          <option value="">すべて</option>
          <option value="1">仕入先</option>
          <option value="2">販売先</option>
          <option value="3">両方</option>
        </select>
      </div>
      <div class="search__actions">
        <button class="btn btn--primary btn--sm" type="submit">検索</button>
        <a class="btn btn--sm" href="./torihiki_list.html">クリア</a>
      </div>
    </form>

    <div class="btn-group">
      <a class="btn btn--primary" href="./torihiki_form.html">新規登録</a>
      <a class="btn" href="./menu.html">メニューへ戻る</a>
    </div>

    <table class="table" aria-label="取引先マスタ一覧">
      <thead>
        <tr>
          <th scope="col">取引先コード</th>
          <th scope="col">取引先名</th>
          <th scope="col">区分</th>
          <th scope="col">電話番号</th>
          <th scope="col">担当者</th>
          <th scope="col">登録日</th>
          <th scope="col">操作</th>
        </tr>
      </thead>
      <tbody>
        ${raw:rows}
      </tbody>
    </table>

    <nav class="pagination" aria-label="ページ送り">
      <span class="pagination__current">1</span> / 1
    </nav>
  </main>

  <footer class="footer">
    <small>&copy; Stationery Core System</small>
  </footer>

  <script src="./js/common.js"></script>
</body>
</html>
